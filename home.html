<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Home</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font awesome connected -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font geist -->
    <ylink rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
        <!-- daisy ui + tailwind  -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#f8fafc]">
    <header class="bg-white w-full mx-auto">
        <nav class="flex flex-col ml-10 mr-10 md:flex-row items-center p-4 md:justify-between">
            <div class="flex items-center gap-2">
                <img class="h-10" src="assets/github-logo.png" alt="">
                <h2 class="font-bold text-[20px]">Github Issues Tracker</h2>
            </div>
            <div class="join gap-2 mt-4">
                <div class="join-item">
                    <label class="input flex items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="searchInput" type="text" class="grow w-full" placeholder="Search issues..." required />
                    </label>
                </div>

                <button id="searchBtn" class="btn btn-primary join-item"><i class="fa-solid fa-plus t-[7px]"></i> New issue</button>
            </div>
        </nav>
    </header>


    <section class="py-5">

        <!-- Filter Buttons -->
        <div class="bg-white p-4 md:w-[80%] mx-auto rounded-lg shadow flex gap-3">
            <button id="btn-all" class="btn btn-primary h-9 px-4">All</button>
            <button id="btn-open" class="btn h-9 px-4">Open</button>
            <button id="btn-closed" class="btn h-9 px-4">Closed</button>
        </div>

        <!-- Issues Container -->
        <div class="bg-white md:w-[80%] mx-auto rounded-xl shadow mt-5">

            <!-- Header -->
            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 p-5">

                <div class="flex items-center gap-3">
                    <img class="h-10" src="assets/Aperture.png" alt="">
                    <div>
                        <h2 class="font-semibold text-lg"><span id="count">50</span> Issues</h2>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-5 text-sm">
                    <div class="flex items-center gap-1">
                        <img class="h-5" src="assets/Open-Status.png" alt="">
                        <p>Open</p>
                    </div>

                    <div class="flex items-center gap-1">
                        <img class="h-5" src="assets/Closed- Status .png" alt="">
                        <p>Closed</p>
                    </div>
                </div>

            </div>

            <!-- Cards Section -->
            <section>
                <div id="all-card-container"
                    class="bg-[#f1f5f9] p-6 grid gap-5 grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4">

                    <!-- Card -->
                </div>
            </section>


        </div>

    </section>

    <script src="script/index.js"></script>
</body>

</html>
