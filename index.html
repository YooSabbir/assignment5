<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Login</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font awesome connected -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font geist -->
    <ylink rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
        <!-- daisy ui + tailwind  -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <section class="space-y-4 pt-15">
        <div class="text-center pt-10">
            <div class="flex justify-center h-20 mb-3"><img src="assets/github-logo.png" alt=""></div>
            <h2 class="font-bold text-[20px]">Github Issues Tracker</h2>
            <p class="text-gray-500 text-[13px]">Sign in to manage your issues</p>
        </div>
        <div class="flex justify-center items-center">
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full ml-8 mr-8">
                <label class="label">Username</label>
                <input value="admin" id="username" type="text" class="input  w-full" placeholder="Enter Username" />
                <p class="text-[#4a00ff]">Default: admin</p>

                <label class="label">Password</label>
                <input value="admin123" id="password" type="password" class="input  w-full" placeholder="Enter Password" />
                <p class="text-[#4a00ff]">Password: admin123</p>

                <button id="signin" class="btn btn-primary mt-4">Sign in</button>
            </fieldset>
        </div>
        <div class="divider text-[15px]">OR</div>

        <div class="credintials bg-gray-200 p-4 text-center w-11/12 mx-auto rounded-sm">
            <p class="text-[12px]"><span class="font-bold">Username:</span> admin</p>
            <p class="text-[12px]"><span class="font-bold">Password:</span> admin123</p>
        </div>
    </section>
    <script src="script/login.js"></script>
</body>

</html>
